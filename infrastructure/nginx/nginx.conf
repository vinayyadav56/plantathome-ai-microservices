events {
    worker_connections 1024;
}

http {
    upstream recommendation  { server recommendation-service:8001; }
    upstream chatbot         { server chatbot-service:8002; }
    upstream plant_doctor    { server plant-doctor-service:8003; }
    upstream seo             { server seo-service:8004; }
    upstream search          { server semantic-search-service:8005; }
    upstream notifications   { server notification-service:8006; }
    upstream media           { server media-service:8007; }
    upstream analytics       { server analytics-service:8008; }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        # ── Health check ──────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── AI Services ───────────────────────────────────────
        location /api/recommendations {
            proxy_pass         http://recommendation;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        location /api/chat {
            proxy_pass         http://chatbot;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        location /api/plant-diagnosis {
            proxy_pass         http://plant_doctor;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 90s;
        }

        location /api/seo/ {
            proxy_pass         http://seo/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        location /api/search {
            proxy_pass         http://search;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location /api/notify {
            proxy_pass         http://notifications;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location /api/media/ {
            proxy_pass         http://media/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        location /api/analytics/ {
            proxy_pass         http://analytics/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # ── Service Swagger docs (dev only) ───────────────────
        location /docs/recommendations/ { proxy_pass http://recommendation/docs/; }
        location /docs/chat/            { proxy_pass http://chatbot/docs/; }
        location /docs/doctor/          { proxy_pass http://plant_doctor/docs/; }
        location /docs/seo/             { proxy_pass http://seo/docs/; }
        location /docs/search/          { proxy_pass http://search/docs/; }
        location /docs/notify/          { proxy_pass http://notifications/docs/; }
        location /docs/media/           { proxy_pass http://media/docs/; }
        location /docs/analytics/       { proxy_pass http://analytics/docs/; }
    }
}
