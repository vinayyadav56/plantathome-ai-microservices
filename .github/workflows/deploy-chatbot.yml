name: Deploy Chatbot Service (Railway)

# Deploys chatbot-service/ to the existing `plantathome-staging` Railway project
# from a GitHub runner (which CAN reach railway.app), using an account token.
# Manual-only so it never auto-fails on push.
#
# Required GitHub secrets:
#   RAILWAY_API_TOKEN      Railway account/team token
#   AI_CHAT_SHARED_SECRET  shared secret (= SERVICE_API_KEY = PERSIST_KEY,
#                          must also match shop CHATBOT_SERVICE_API_KEY + API AI_CHAT_SERVICE_API_KEY)
# OPENAI_API_KEY is read from the existing plant-doctor service via the Railway API.

on:
  workflow_dispatch:
    inputs:
      persist_url:
        description: 'Laravel persist endpoint'
        required: false
        default: 'https://plantathome-production.up.railway.app/api/ai-chat/persist'
      cors_origins:
        description: 'Allowed shop origins'
        required: false
        default: 'https://plantathome-shop-staging.vercel.app'

env:
  RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
  PROJECT_ID: e6fc52de-45a9-4bc0-92fe-5b9840a4d399
  ENVIRONMENT_ID: 268099e7-b634-4d26-a5ff-a95a0c145f8f
  PD_SERVICE_ID: 24239d83-1db8-4f02-b134-1c89e6eee268
  SERVICE_NAME: chatbot-service
  PERSIST_URL: ${{ github.event.inputs.persist_url || 'https://plantathome-production.up.railway.app/api/ai-chat/persist' }}
  CORS_ORIGINS: ${{ github.event.inputs.cors_origins || 'https://plantathome-shop-staging.vercel.app' }}
  SHARED: ${{ secrets.AI_CHAT_SHARED_SECRET }}

jobs:
  deploy:
    name: Deploy chatbot to plantathome-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preflight
        run: |
          [ -n "$RAILWAY_API_TOKEN" ] || { echo "::error::Missing RAILWAY_API_TOKEN"; exit 1; }
          [ -n "$SHARED" ] || { echo "::error::Missing AI_CHAT_SHARED_SECRET"; exit 1; }

      - name: Install Railway CLI
        run: npm i -g @railway/cli && railway --version

      - name: Diagnostics (non-fatal)
        continue-on-error: true
        run: |
          echo "## whoami"; railway whoami || true
          echo "## list";   railway list   || true

      - name: Read OPENAI_API_KEY from plant-doctor (Railway API)
        run: |
          set -e
          q='{"query":"query v($p:String!,$e:String!,$s:String!){variables(projectId:$p,environmentId:$e,serviceId:$s)}","variables":{"p":"'"$PROJECT_ID"'","e":"'"$ENVIRONMENT_ID"'","s":"'"$PD_SERVICE_ID"'"}}'
          resp=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$q")
          # Don't print the raw response (contains secrets). Extract the key with python.
          OPENAI=$(python3 -c "import json,sys;d=json.load(sys.stdin);print((d.get('data',{}).get('variables') or {}).get('OPENAI_API_KEY',''))" <<<"$resp")
          if [ -z "$OPENAI" ]; then
            echo "::error::Could not read OPENAI_API_KEY from plant-doctor service. API errors (redacted keys):"
            echo "$resp" | python3 -c "import json,sys;d=json.load(sys.stdin);print('errors:',d.get('errors'));print('var keys:',list((d.get('data',{}).get('variables') or {}).keys()))" || echo "(unparseable response)"
            exit 1
          fi
          echo "::add-mask::$OPENAI"
          echo "OPENAI_API_KEY=$OPENAI" >> "$GITHUB_ENV"
          echo "OpenAI key sourced from plant-doctor ✓ (len ${#OPENAI})"

      - name: Link project + environment
        run: railway link --project "$PROJECT_ID" --environment "$ENVIRONMENT_ID"

      - name: Ensure chatbot service exists
        continue-on-error: true
        run: |
          railway add --service "$SERVICE_NAME" 2>&1 | tee /tmp/add.log \
            || echo "service add returned non-zero (may already exist) — continuing"

      - name: Ensure Redis exists
        continue-on-error: true
        run: |
          railway add --database redis 2>&1 | tee /tmp/redis.log \
            || echo "redis add returned non-zero (may already exist) — continuing"

      - name: Set service variables
        run: |
          set -x
          railway variables --service "$SERVICE_NAME" \
            --set "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            --set "OPENAI_MODEL=gpt-4o-mini" \
            --set "SERVICE_API_KEY=${SHARED}" \
            --set "PERSIST_KEY=${SHARED}" \
            --set "PERSIST_URL=${PERSIST_URL}" \
            --set "CORS_ORIGINS=${CORS_ORIGINS}" \
            --set 'REDIS_URL=${{Redis.REDIS_URL}}' \
            --skip-deploys

      - name: Deploy (railway up)
        working-directory: chatbot-service
        run: railway up --service "$SERVICE_NAME" --ci

      - name: Ensure public domain
        id: domain
        continue-on-error: true
        run: |
          out=$(railway domain --service "$SERVICE_NAME" 2>&1 || true); echo "$out"
          url=$(echo "$out" | grep -oE 'https://[a-zA-Z0-9.-]+\.up\.railway\.app' | head -1)
          echo "service_url=$url" >> "$GITHUB_OUTPUT"

      - name: Summary + health
        run: |
          URL="${{ steps.domain.outputs.service_url }}"
          {
            echo "## Chatbot deploy"
            if [ -n "$URL" ]; then
              echo "- URL: \`$URL\`"
              echo '```'
              curl -fsS --max-time 30 "$URL/health" || echo "health not up yet (build may still be finishing)"
              echo '```'
            else
              echo "- Domain not auto-detected — generate one in the dashboard if needed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
